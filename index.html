<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar Político — Acrópole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0b;
  --surface:   #111113;
  --surface2:  #18181c;
  --border:    #2a2a30;
  --border2:   #3a3a42;

  --text:      #e8e8ec;
  --text-2:    #9898a8;
  --text-3:    #606070;

  --red:       #e63946;
  --red-dim:   rgba(230,57,70,0.12);
  --amber:     #f4a261;
  --amber-dim: rgba(244,162,97,0.12);
  --green:     #2ec487;
  --green-dim: rgba(46,196,135,0.12);
  --blue:      #4361ee;
  --blue-dim:  rgba(67,97,238,0.12);

  --font-display: 'Playfair Display', Georgia, serif;
  --font-mono:    'IBM Plex Mono', monospace;
  --font-ui:      'Inter', system-ui, sans-serif;

  --radius: 6px;
  --transition: 150ms ease;
}

html { background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; }
body { min-height: 100vh; }

/* ── SCROLLBAR ────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── LOGIN ────────────────────────────────────────────────────────────────── */
#login-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 100;
}
.login-box {
  width: 360px; padding: 48px 40px;
  border: 1px solid var(--border); background: var(--surface);
}
.login-box h1 {
  font-family: var(--font-display); font-size: 28px; font-weight: 900;
  margin-bottom: 4px; color: var(--text);
}
.login-box .login-sub {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .12em; margin-bottom: 32px;
}
.login-box input {
  width: 100%; padding: 12px 14px; background: var(--bg);
  border: 1px solid var(--border); color: var(--text);
  font-family: var(--font-mono); font-size: 13px;
  margin-bottom: 12px; outline: none;
  transition: border var(--transition);
}
.login-box input:focus { border-color: var(--red); }
.login-box button {
  width: 100%; padding: 12px; background: var(--red);
  border: none; color: #fff; font-family: var(--font-ui); font-size: 13px;
  font-weight: 600; cursor: pointer; letter-spacing: .04em; text-transform: uppercase;
  transition: opacity var(--transition);
}
.login-box button:hover { opacity: 0.85; }
.login-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

/* ── LAYOUT ───────────────────────────────────────────────────────────────── */
#app { display: none; flex-direction: column; height: 100vh; }

/* ── HEADER ───────────────────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; gap: 24px;
  padding: 0 24px; height: 56px;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.header-brand {
  display: flex; align-items: baseline; gap: 10px;
}
.header-brand h1 {
  font-family: var(--font-display); font-size: 20px; font-weight: 900;
  color: var(--text); white-space: nowrap;
}
.header-brand .tag {
  font-family: var(--font-mono); font-size: 10px; color: var(--red);
  text-transform: uppercase; letter-spacing: .12em;
  border: 1px solid var(--red); padding: 2px 7px;
}

.header-stats {
  display: flex; gap: 20px; margin-left: auto;
}
.stat-pill {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
}
.stat-pill .num {
  font-size: 13px; font-weight: 500; color: var(--text);
}
.stat-pill.s-approved .num { color: var(--green); }
.stat-pill.s-pending  .num { color: var(--amber); }
.stat-pill.s-rejected .num { color: var(--text-3); }

.header-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border: 1px solid var(--border);
  background: transparent; color: var(--text-2);
  font-family: var(--font-ui); font-size: 12px; font-weight: 500;
  cursor: pointer; letter-spacing: .02em; white-space: nowrap;
  transition: all var(--transition);
}
.btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
.btn.primary:hover { opacity: 0.85; }
.btn.active { border-color: var(--red); color: var(--red); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn svg { width: 14px; height: 14px; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABS ─────────────────────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  padding: 0 24px; background: var(--surface); flex-shrink: 0;
}
.tab {
  padding: 12px 18px; font-size: 12px; font-weight: 500;
  color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; letter-spacing: .02em; user-select: none;
  transition: color var(--transition);
}
.tab:hover { color: var(--text-2); }
.tab.active { color: var(--text); border-bottom-color: var(--red); }
.tab .badge {
  display: inline-block; margin-left: 6px; padding: 1px 6px;
  background: var(--surface2); border: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  border-radius: 20px;
}
.tab.active .badge { background: var(--red-dim); border-color: var(--red); color: var(--red); }

/* ── TOOLBAR ──────────────────────────────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 24px; border-bottom: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.search-wrap {
  position: relative; flex: 1; max-width: 320px;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--text-3); pointer-events: none;
}
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 34px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font-ui); font-size: 13px;
  outline: none; transition: border var(--transition);
}
.search-wrap input:focus { border-color: var(--border2); }
.search-wrap input::placeholder { color: var(--text-3); }

.filter-group { display: flex; gap: 4px; }
.filter-btn {
  padding: 6px 12px; font-size: 11px; border: 1px solid var(--border);
  background: transparent; color: var(--text-3); cursor: pointer;
  font-family: var(--font-mono); letter-spacing: .04em; text-transform: uppercase;
  transition: all var(--transition);
}
.filter-btn:hover { border-color: var(--border2); color: var(--text-2); }
.filter-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

.toolbar-right { margin-left: auto; display: flex; gap: 8px; }

/* ── MAIN PANELS ──────────────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── FEED ─────────────────────────────────────────────────────────────────── */
.feed-panel {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 10px;
}

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 40px; color: var(--text-3);
  text-align: center;
}
.empty-state .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
.empty-state p { font-family: var(--font-mono); font-size: 12px; }

/* ── ITEM CARD ────────────────────────────────────────────────────────────── */
.item-card {
  background: var(--surface); border: 1px solid var(--border);
  padding: 16px 18px; cursor: default;
  transition: border-color var(--transition);
  animation: fadeIn 200ms ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.item-card:hover { border-color: var(--border2); }
.item-card.approved { border-left: 3px solid var(--green); }
.item-card.rejected { opacity: 0.45; }
.item-card.generating { border-color: var(--amber); }

.item-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.item-source {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-3); text-transform: uppercase; letter-spacing: .08em;
}
.item-cat {
  font-family: var(--font-mono); font-size: 10px; padding: 1px 7px;
  border-radius: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em;
}
.item-cat.politica-br { background: var(--red-dim); color: var(--red); }
.item-cat.geopolitica { background: var(--blue-dim); color: #7b93ff; }
.item-date {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3); margin-left: auto;
}

.item-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  color: var(--text); line-height: 1.35; margin-bottom: 6px;
}
.item-title a {
  color: inherit; text-decoration: none;
}
.item-title a:hover { color: var(--text-2); }

.item-summary {
  font-size: 12px; color: var(--text-2); line-height: 1.6;
  margin-bottom: 12px; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* Post gerado */
.post-block {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 12px 14px; margin-bottom: 10px;
}
.post-block-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.post-block-label {
  font-family: var(--font-mono); font-size: 10px; color: var(--amber);
  text-transform: uppercase; letter-spacing: .1em;
}
.post-block-type {
  font-family: var(--font-mono); font-size: 10px;
  padding: 1px 6px; border: 1px solid var(--border);
  color: var(--text-3);
}
.post-block-chars {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3); margin-left: auto;
}
.post-text {
  font-family: var(--font-mono); font-size: 12px; color: var(--text);
  line-height: 1.7; white-space: pre-wrap; word-break: break-word;
}
.post-text.editable {
  outline: none; border: 1px dashed var(--border2); padding: 6px;
  min-height: 60px;
}
.post-text.editable:focus { border-color: var(--amber); }
.editorial-note {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-3); line-height: 1.5;
}
.editorial-note strong { color: var(--text-2); }

/* Ações do card */
.item-actions {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.act-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border); background: transparent;
  cursor: pointer; font-family: var(--font-ui); color: var(--text-3);
  transition: all var(--transition); white-space: nowrap;
}
.act-btn:hover { border-color: var(--border2); color: var(--text); }
.act-btn.approve { border-color: var(--green); color: var(--green); }
.act-btn.approve:hover { background: var(--green-dim); }
.act-btn.reject { border-color: var(--border); color: var(--text-3); }
.act-btn.reject:hover { background: var(--surface2); color: var(--red); border-color: var(--red); }
.act-btn.gen { border-color: var(--amber); color: var(--amber); }
.act-btn.gen:hover { background: var(--amber-dim); }
.act-btn.copy { border-color: var(--border); }
.act-btn svg { width: 12px; height: 12px; }

/* ── PAINEL DIREITO — PAUTAS APROVADAS ────────────────────────────────────── */
.board-panel {
  width: 340px; flex-shrink: 0; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; background: var(--surface);
}
.board-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.board-header h2 {
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  color: var(--text);
}
.board-header .board-count {
  font-family: var(--font-mono); font-size: 11px;
  padding: 1px 8px; background: var(--green-dim);
  border: 1px solid var(--green); color: var(--green);
  border-radius: 20px; margin-left: auto;
}

.board-list {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
}

.board-item {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 12px 14px; cursor: grab; transition: border-color var(--transition);
  position: relative;
}
.board-item:hover { border-color: var(--border2); }
.board-item.dragging { opacity: 0.5; border-color: var(--amber); cursor: grabbing; }
.board-item.drag-over { border-color: var(--green); border-style: dashed; }

.board-item-num {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  margin-bottom: 6px;
}
.board-item-title {
  font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.4;
  margin-bottom: 6px;
}
.board-item-source {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  text-transform: uppercase; margin-bottom: 8px;
}
.board-item-preview {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-2);
  line-height: 1.5; display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.board-item-actions {
  display: flex; gap: 6px; margin-top: 10px;
}
.board-act {
  flex: 1; padding: 5px; font-size: 10px; font-family: var(--font-mono);
  border: 1px solid var(--border); background: transparent; color: var(--text-3);
  cursor: pointer; text-align: center; text-transform: uppercase; letter-spacing: .04em;
  transition: all var(--transition);
}
.board-act:hover { border-color: var(--border2); color: var(--text); }
.board-act.copy:hover { border-color: var(--amber); color: var(--amber); }
.board-act.remove:hover { border-color: var(--red); color: var(--red); }

.board-empty {
  display: flex; align-items: center; justify-content: center;
  flex: 1; flex-direction: column; gap: 8px;
  color: var(--text-3); padding: 40px 20px; text-align: center;
}
.board-empty p { font-family: var(--font-mono); font-size: 11px; line-height: 1.6; }

/* ── TAB APROVADOS ────────────────────────────────────────────────────────── */
#tab-approved .approved-grid {
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.approved-card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--green);
  padding: 16px 18px;
  animation: fadeIn 200ms ease;
}
.approved-card-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.approved-card-title {
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  color: var(--text); line-height: 1.3; margin-bottom: 4px;
}
.approved-card-meta {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px;
}
.approved-post-text {
  font-family: var(--font-mono); font-size: 12px; color: var(--text);
  line-height: 1.7; white-space: pre-wrap; background: var(--surface2);
  border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 10px;
  word-break: break-word;
}
.approved-actions { display: flex; gap: 6px; }

/* ── TOAST ────────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 12px 18px; font-size: 12px;
  font-family: var(--font-mono); max-width: 320px;
  transform: translateY(80px); opacity: 0;
  transition: all 300ms ease; pointer-events: none;
}
#toast.show { transform: none; opacity: 1; }
#toast.success { border-color: var(--green); color: var(--green); }
#toast.error   { border-color: var(--red);   color: var(--red);   }

/* ── LOADING OVERLAY ──────────────────────────────────────────────────────── */
.loading-row {
  display: flex; align-items: center; gap: 8px; justify-content: center;
  padding: 40px; color: var(--text-3);
  font-family: var(--font-mono); font-size: 12px;
}
.pulse { width: 8px; height: 8px; background: var(--amber); border-radius: 50%; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100% { opacity: 0.2; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.2); } }

/* ── RESPONSIVE ───────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .board-panel { display: none; }
  .header-stats { display: none; }
}
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <h1>Radar Político</h1>
    <div class="login-sub">Acrópole · Pipeline Editorial</div>
    <input type="password" id="pw-input" placeholder="Senha do dashboard" autocomplete="current-password">
    <button id="pw-btn">Entrar</button>
    <div class="login-error" id="login-error">Senha incorreta</div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-brand">
      <h1>Radar Político</h1>
      <span class="tag">Live</span>
    </div>

    <div class="header-stats">
      <div class="stat-pill">
        <span>Total</span><span class="num" id="stat-total">—</span>
      </div>
      <div class="stat-pill s-pending">
        <span>Pendente</span><span class="num" id="stat-pending">—</span>
      </div>
      <div class="stat-pill s-approved">
        <span>Aprovado</span><span class="num" id="stat-approved">—</span>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn" id="btn-fetch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
        </svg>
        Buscar fontes
      </button>
      <button class="btn primary" id="btn-batch-gen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Gerar posts
      </button>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" data-tab="feed">
      Feed
      <span class="badge" id="tab-feed-badge">0</span>
    </div>
    <div class="tab" data-tab="approved">
      Pautas aprovadas
      <span class="badge" id="tab-approved-badge">0</span>
    </div>
  </div>

  <!-- TAB: FEED -->
  <div id="tab-feed" style="display:flex; flex:1; overflow:hidden; flex-direction:column;">

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar por título ou fonte…">
      </div>

      <div class="filter-group" id="status-filters">
        <button class="filter-btn active" data-status="">Todos</button>
        <button class="filter-btn" data-status="pending">Pendente</button>
        <button class="filter-btn" data-status="approved">Aprovado</button>
        <button class="filter-btn" data-status="rejected">Rejeitado</button>
      </div>

      <div class="filter-group" id="cat-filters">
        <button class="filter-btn active" data-cat="">Tudo</button>
        <button class="filter-btn" data-cat="politica-br">BR</button>
        <button class="filter-btn" data-cat="geopolitica">Geo</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- FEED LIST -->
      <div class="feed-panel" id="feed-list">
        <div class="loading-row">
          <div class="pulse"></div> Carregando itens…
        </div>
      </div>

      <!-- BOARD LATERAL -->
      <div class="board-panel">
        <div class="board-header">
          <h2>Fila de publicação</h2>
          <span class="board-count" id="board-count">0</span>
        </div>
        <div class="board-list" id="board-list">
          <div class="board-empty">
            <p>Aprove pautas no feed para montar a fila de publicação.</p>
          </div>
        </div>
      </div>

    </div><!-- /main -->
  </div><!-- /tab-feed -->

  <!-- TAB: APROVADOS -->
  <div id="tab-approved" style="display:none; flex:1; overflow-y:auto;">
    <div class="approved-grid" id="approved-list">
      <div class="loading-row"><div class="pulse"></div> Carregando…</div>
    </div>
  </div>

</div><!-- /app -->

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════════════════
let TOKEN       = localStorage.getItem('radar_token') || '';
let allItems    = [];
let activeStatus = '';
let activeCat    = '';
let searchQ      = '';
let dragSrc      = null;

// ═══════════════════════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════════════════════
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'x-radar-token': TOKEN,
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { logout(); throw new Error('Não autorizado'); }
  return res.json();
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════════════
function logout() {
  localStorage.removeItem('radar_token');
  TOKEN = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function tryLogin(pw) {
  TOKEN = pw;
  try {
    const data = await api('GET', '/api/stats');
    if (data.error) throw new Error();
    localStorage.setItem('radar_token', pw);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    init();
  } catch {
    TOKEN = '';
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('pw-btn').onclick = () =>
  tryLogin(document.getElementById('pw-input').value);
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin(e.target.value);
});

if (TOKEN) tryLogin(TOKEN);

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
function init() {
  loadStats();
  loadItems();
  setupEventListeners();
}

// ═══════════════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════════════
async function loadStats() {
  const data = await api('GET', '/api/stats');
  document.getElementById('stat-total').textContent    = data.total    || 0;
  document.getElementById('stat-pending').textContent  = data.pending  || 0;
  document.getElementById('stat-approved').textContent = data.approved || 0;
  document.getElementById('tab-feed-badge').textContent     = data.total    || 0;
  document.getElementById('tab-approved-badge').textContent = data.approved || 0;
  document.getElementById('board-count').textContent        = data.approved || 0;
}

// ═══════════════════════════════════════════════════════════════════════════
// LOAD ITEMS
// ═══════════════════════════════════════════════════════════════════════════
async function loadItems() {
  const params = new URLSearchParams();
  if (activeStatus) params.set('status', activeStatus);
  if (activeCat)    params.set('category', activeCat);
  if (searchQ)      params.set('q', searchQ);
  params.set('sort', 'newest');

  const data = await api('GET', `/api/items?${params}`);
  allItems = data.items || [];
  renderFeed(allItems);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER FEED
// ═══════════════════════════════════════════════════════════════════════════
function renderFeed(items) {
  const container = document.getElementById('feed-list');

  if (!items.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">◎</div>
        <p>Nenhum item encontrado.<br>Clique em "Buscar fontes" para atualizar.</p>
      </div>`;
    return;
  }

  container.innerHTML = items.map(item => renderCard(item)).join('');
  attachCardEvents(container);
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const h = Math.floor(diff / 3600000);
  const m = Math.floor(diff / 60000);
  if (h >= 24) return `${Math.floor(h/24)}d atrás`;
  if (h >= 1)  return `${h}h atrás`;
  if (m >= 1)  return `${m}min atrás`;
  return 'agora';
}

function renderCard(item) {
  const postBlock = item.generatedPost ? renderPostBlock(item) : '';
  const hasPost   = !!item.generatedPost;
  const isApproved = item.status === 'approved';
  const isRejected = item.status === 'rejected';

  return `
  <div class="item-card ${item.status}" data-id="${item.id}">
    <div class="item-meta">
      <span class="item-source">${escHtml(item.source)}</span>
      <span class="item-cat ${item.category}">${item.category === 'geopolitica' ? 'Geopolítica' : 'Política BR'}</span>
      <span class="item-date">${timeAgo(item.publishedAt)}</span>
    </div>

    <div class="item-title">
      ${item.url
        ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>`
        : escHtml(item.title)}
    </div>

    ${item.summary ? `<div class="item-summary">${escHtml(item.summary)}</div>` : ''}

    ${postBlock}

    <div class="item-actions">
      ${!hasPost
        ? `<button class="act-btn gen" data-action="generate" data-id="${item.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            Gerar post
           </button>`
        : `<button class="act-btn gen" data-action="regen" data-id="${item.id}">↺ Regerar</button>`
      }
      ${!isApproved
        ? `<button class="act-btn approve" data-action="approve" data-id="${item.id}">✓ Aprovar</button>`
        : `<button class="act-btn" data-action="pending" data-id="${item.id}">↩ Remover aprovação</button>`
      }
      ${!isRejected
        ? `<button class="act-btn reject" data-action="reject" data-id="${item.id}">✕ Rejeitar</button>`
        : `<button class="act-btn" data-action="pending" data-id="${item.id}">↩ Restaurar</button>`
      }
      ${hasPost
        ? `<button class="act-btn copy" data-action="copy" data-id="${item.id}">⎘ Copiar post</button>`
        : ''
      }
    </div>
  </div>`;
}

function renderPostBlock(item) {
  const gp  = item.generatedPost;
  const fmt  = gp.format || 'single';
  const text = fmt === 'thread'
    ? (gp.thread || []).join('\n\n— — —\n\n')
    : (gp.post || item.postText || '');

  const chars = text.length;
  const hookLabel = {
    dado_concreto: 'Dado concreto',
    contradição:   'Contradição',
    revelação:     'Revelação',
    urgência:      'Urgência',
    ironia:        'Ironia',
    fallback:      'Fallback',
  }[gp.hook_type] || gp.hook_type || '';

  return `
  <div class="post-block">
    <div class="post-block-header">
      <span class="post-block-label">Post X</span>
      <span class="post-block-type">${fmt === 'thread' ? '🧵 Thread' : 'Single'}</span>
      ${hookLabel ? `<span class="post-block-type">${hookLabel}</span>` : ''}
      <span class="post-block-chars">${chars} chars</span>
    </div>
    <div class="post-text editable" contenteditable="true" data-id="${item.id}"
      spellcheck="false">${escHtml(text)}</div>
    ${gp.editorial_note ? `
    <div class="editorial-note">
      <strong>Nota editorial:</strong> ${escHtml(gp.editorial_note)}
    </div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
// CARD EVENTS
// ═══════════════════════════════════════════════════════════════════════════
function attachCardEvents(container) {
  container.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;

    if (action === 'generate' || action === 'regen') await doGenerate(id, btn);
    if (action === 'approve')  await doStatus(id, 'approved');
    if (action === 'reject')   await doStatus(id, 'rejected');
    if (action === 'pending')  await doStatus(id, 'pending');
    if (action === 'copy')     doCopy(id);
  });

  // Salva edição do post ao sair do campo
  container.addEventListener('blur', async e => {
    if (!e.target.classList.contains('post-text')) return;
    const id   = e.target.dataset.id;
    const text = e.target.innerText;
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    // Atualiza localmente e no server
    item.postText = text;
    if (item.generatedPost) item.generatedPost.post = text;
    await api('PATCH', `/api/items/${id}`, { postText: text });
  }, true);
}

async function doGenerate(id, btn) {
  const card = document.querySelector(`.item-card[data-id="${id}"]`);
  if (card) card.classList.add('generating');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    const data = await api('POST', `/api/generate/${id}`);
    const idx  = allItems.findIndex(i => i.id === id);
    if (idx !== -1) allItems[idx] = data.item;
    // Re-renderiza só esse card
    const newHtml = renderCard(data.item);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHtml;
    const newCard = tmp.firstElementChild;
    if (card) { card.replaceWith(newCard); attachCardEvents(newCard.parentElement || document.getElementById('feed-list')); }
    toast('Post gerado com sucesso', 'success');
    loadStats();
  } catch (err) {
    toast('Erro ao gerar post: ' + err.message, 'error');
    if (card) card.classList.remove('generating');
    if (btn) { btn.disabled = false; btn.textContent = 'Gerar post'; }
  }
}

async function doStatus(id, status) {
  await api('PATCH', `/api/items/${id}`, { status });
  const idx = allItems.findIndex(i => i.id === id);
  if (idx !== -1) allItems[idx].status = status;

  // Atualiza card sem recarregar tudo
  const card = document.querySelector(`.item-card[data-id="${id}"]`);
  if (card) {
    const newHtml = renderCard(allItems[idx]);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHtml;
    const newCard = tmp.firstElementChild;
    card.replaceWith(newCard);
    attachCardEvents(newCard.parentElement || document.getElementById('feed-list'));
  }

  loadStats();
  loadBoard();

  if (status === 'approved') toast('Pauta aprovada — adicionada à fila', 'success');
  if (status === 'rejected') toast('Pauta rejeitada');
}

function doCopy(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  const text = item.postText || item.generatedPost?.post || '';
  navigator.clipboard.writeText(text).then(() => toast('Copiado para a área de transferência', 'success'));
}

// ═══════════════════════════════════════════════════════════════════════════
// BOARD
// ═══════════════════════════════════════════════════════════════════════════
async function loadBoard() {
  const data     = await api('GET', '/api/approved');
  const approved = (data.items || []).sort((a, b) => (a.boardOrder ?? 999) - (b.boardOrder ?? 999));
  renderBoard(approved);
  document.getElementById('board-count').textContent        = approved.length;
  document.getElementById('tab-approved-badge').textContent = approved.length;
}

function renderBoard(items) {
  const list = document.getElementById('board-list');

  if (!items.length) {
    list.innerHTML = `<div class="board-empty"><p>Aprove pautas no feed para montar a fila de publicação.</p></div>`;
    return;
  }

  list.innerHTML = items.map((item, idx) => {
    const text = item.postText || item.generatedPost?.post || '(sem post gerado)';
    return `
    <div class="board-item" draggable="true" data-id="${item.id}" data-idx="${idx}">
      <div class="board-item-num">#${idx + 1}</div>
      <div class="board-item-title">${escHtml(item.title)}</div>
      <div class="board-item-source">${escHtml(item.source)}</div>
      <div class="board-item-preview">${escHtml(text)}</div>
      <div class="board-item-actions">
        <button class="board-act copy" onclick="boardCopy('${item.id}')">Copiar</button>
        <button class="board-act remove" onclick="boardRemove('${item.id}')">Remover</button>
      </div>
    </div>`;
  }).join('');

  // Drag & drop
  list.querySelectorAll('.board-item').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrc = el;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      list.querySelectorAll('.board-item').forEach(c => c.classList.remove('drag-over'));
      saveBoardOrder();
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if (el !== dragSrc) { list.querySelectorAll('.board-item').forEach(c => c.classList.remove('drag-over')); el.classList.add('drag-over'); }
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === el) return;
      const parent = el.parentNode;
      const srcIdx  = [...parent.children].indexOf(dragSrc);
      const tgtIdx  = [...parent.children].indexOf(el);
      if (srcIdx < tgtIdx) parent.insertBefore(dragSrc, el.nextSibling);
      else parent.insertBefore(dragSrc, el);
    });
  });
}

async function saveBoardOrder() {
  const ids = [...document.querySelectorAll('#board-list .board-item')].map(el => el.dataset.id);
  await api('POST', '/api/approved/reorder', { ids });
}

window.boardCopy = function(id) {
  api('GET', `/api/items?status=approved`).then(data => {
    const item = (data.items || []).find(i => i.id === id);
    if (!item) return;
    const text = item.postText || item.generatedPost?.post || '';
    navigator.clipboard.writeText(text).then(() => toast('Post copiado!', 'success'));
  });
};

window.boardRemove = async function(id) {
  await doStatus(id, 'pending');
  toast('Removido da fila de publicação');
};

// ═══════════════════════════════════════════════════════════════════════════
// TAB APROVADOS
// ═══════════════════════════════════════════════════════════════════════════
async function loadApprovedTab() {
  const list = document.getElementById('approved-list');
  list.innerHTML = `<div class="loading-row"><div class="pulse"></div> Carregando…</div>`;

  const data     = await api('GET', '/api/approved');
  const approved = data.items || [];

  if (!approved.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">◎</div><p>Nenhuma pauta aprovada ainda.</p></div>`;
    return;
  }

  list.innerHTML = approved.map(item => {
    const text = item.postText || item.generatedPost?.post || '(sem post)';
    const fmt  = item.generatedPost?.format || 'single';
    return `
    <div class="approved-card">
      <div class="approved-card-header">
        <span class="item-cat ${item.category}">${item.category === 'geopolitica' ? 'Geopolítica' : 'Política BR'}</span>
        <span class="item-source" style="font-size:10px;color:var(--text-3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em;">${escHtml(item.source)}</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-3);margin-left:auto;">${timeAgo(item.updatedAt || item.createdAt)}</span>
      </div>
      <div class="approved-card-title">${escHtml(item.title)}</div>
      <div class="approved-card-meta">${fmt === 'thread' ? '🧵 Thread' : 'Post único'} · ${text.length} chars</div>
      <div class="approved-post-text">${escHtml(text)}</div>
      <div class="approved-actions">
        <button class="act-btn copy" onclick="navigator.clipboard.writeText(${JSON.stringify(text)}).then(()=>toast('Copiado!','success'))">⎘ Copiar</button>
        <button class="act-btn reject" onclick="doStatus('${item.id}','rejected').then(loadApprovedTab)">✕ Remover</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
// EVENTOS GLOBAIS
// ═══════════════════════════════════════════════════════════════════════════
function setupEventListeners() {
  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('tab-feed').style.display     = target === 'feed'     ? 'flex' : 'none';
      document.getElementById('tab-approved').style.display = target === 'approved' ? 'block' : 'none';
      if (target === 'approved') { loadApprovedTab(); loadBoard(); }
      if (target === 'feed')     { loadBoard(); }
    });
  });

  // Buscar fontes
  document.getElementById('btn-fetch').addEventListener('click', async btn => {
    const b = document.getElementById('btn-fetch');
    b.disabled = true;
    b.innerHTML = `<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg> Buscando…`;
    toast('Buscando em todas as fontes…');
    await api('POST', '/api/fetch');
    setTimeout(async () => {
      await loadItems();
      await loadStats();
      b.disabled = false;
      b.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg> Buscar fontes`;
      toast('Fontes atualizadas', 'success');
    }, 12000);
  });

  // Gerar batch
  document.getElementById('btn-batch-gen').addEventListener('click', async () => {
    const b = document.getElementById('btn-batch-gen');
    b.disabled = true;
    b.innerHTML = `<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Gerando…`;
    const data = await api('POST', '/api/generate-batch');
    toast(`Gerando ${data.generating || 0} posts em background…`);
    setTimeout(async () => {
      await loadItems();
      b.disabled = false;
      b.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Gerar posts`;
      toast('Posts gerados', 'success');
    }, Math.max(6000, (data.generating || 5) * 3000));
  });

  // Filtro de status
  document.getElementById('status-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-status]');
    if (!btn) return;
    document.querySelectorAll('#status-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    loadItems();
  });

  // Filtro de categoria
  document.getElementById('cat-filters').addEventListener('click', e => {
    const btn = e.target.closest('[data-cat]');
    if (!btn) return;
    document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    loadItems();
  });

  // Busca
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQ = e.target.value.trim();
      loadItems();
    }, 300);
  });

  // Board no início
  loadBoard();
}

// ═══════════════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
